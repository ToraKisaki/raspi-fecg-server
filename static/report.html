<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fECG • Report</title>
<style>
  :root{ --fecg:#d11e63; --raw:#0e7490; --muted:#5b6b86; }
  *{box-sizing:border-box}
  body{margin:0;background:#f3f5f9;color:#16202e;
    font:14px/1.5 system-ui,Segoe UI,Roboto,Arial,sans-serif}
  .page{max-width:900px;margin:0 auto;padding:28px;background:#fff;min-height:100vh}
  .head{display:flex;align-items:flex-start;gap:16px;border-bottom:2px solid #16202e;padding-bottom:14px}
  .head h1{margin:0;font-size:22px}
  .head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .head .brand{margin-left:auto;text-align:right;font-weight:800;color:var(--fecg)}
  .head .brand small{display:block;color:var(--muted);font-weight:500;font-size:10px;letter-spacing:.3px}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:22px 0 8px}
  .kv{display:grid;grid-template-columns:auto 1fr auto 1fr;gap:6px 16px;font-size:13px}
  .kv .k{color:var(--muted)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .stat{background:#f3f5f9;border:1px solid #e2e7ef;border-radius:10px;padding:10px 12px}
  .stat .n{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .stat.alarm .n{color:var(--fecg)}
  .chartwrap{position:relative;height:240px;background:#05080d;border-radius:8px;overflow:hidden}
  .chartwrap canvas{position:absolute;inset:0;width:100%;height:100%}
  .legend{display:flex;gap:16px;font-size:11px;color:var(--muted);margin-top:8px}
  .legend i{display:inline-block;width:14px;height:3px;vertical-align:middle;margin-right:5px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid #e2e7ef}
  th{color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.4px}
  .toolbar{position:fixed;top:14px;right:14px;display:flex;gap:8px}
  .toolbar button{padding:9px 16px;border:0;border-radius:8px;background:#16202e;color:#fff;
    font-weight:600;cursor:pointer}
  .foot{margin-top:24px;color:var(--muted);font-size:11px;border-top:1px solid #e2e7ef;padding-top:10px}
  @media print{ .toolbar{display:none} body{background:#fff} .page{padding:0} }
</style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">🖨 Print / Save PDF</button>
    <button onclick="history.back()">← Back</button>
  </div>
  <div class="page">
    <div class="head">
      <div>
        <h1 id="pname">Patient report</h1>
        <div class="sub" id="psub"></div>
      </div>
      <div class="brand">fECG<small>Research / educational — not a medical device</small></div>
    </div>

    <h2>Patient</h2>
    <div class="kv" id="kv"></div>

    <h2>Session summary</h2>
    <div class="stats" id="stats"></div>

    <h2>FHR / MHR trend</h2>
    <div class="chartwrap"><canvas id="trendcv"></canvas></div>
    <div class="legend">
      <span><i style="background:var(--fecg)"></i>Fetal HR</span>
      <span><i style="background:var(--raw)"></i>Maternal HR</span>
      <span><i style="background:rgba(52,211,153,.5)"></i>normal band 110–160 bpm</span>
    </div>

    <h2>Alarm &amp; event log</h2>
    <table><thead><tr><th>Time</th><th>Type</th><th>Event</th></tr></thead>
      <tbody id="evrows"></tbody></table>

    <div class="foot" id="foot"></div>
  </div>

<script src="/static/app.js"></script>
<script>
const SID = parseInt(location.pathname.split('/').pop(), 10);

function avg(a){ return a.length ? a.reduce((x,y)=>x+y,0)/a.length : null; }

(async function(){
  const {ok, data} = await api('/api/sessions/'+SID+'/metrics');
  if(!ok){ document.body.innerHTML = '<p style="padding:30px">Session not found.</p>'; return; }
  const s = data.session, metrics = data.metrics||[], events = data.events||[];
  const pres = await api('/api/patients/'+encodeURIComponent(s.patient_id));
  const p = pres.ok ? pres.data : {id:s.patient_id};

  $('#pname').textContent = (p.full_name||p.id) + ' — Session #'+SID;
  $('#psub').textContent = fmtTime(s.started_at) + ' → ' +
    (s.ended_at?fmtTime(s.ended_at):'in progress');
  document.title = 'fECG Report • '+(p.full_name||p.id)+' #'+SID;

  $('#kv').innerHTML = [
    ['Patient ID',p.id],['Name',p.full_name||'—'],['MRN',p.mrn||'—'],
    ['Gender',p.gender||'—'],['DOB',p.date_of_birth||'—'],
    ['Citizen ID',p.citizen_id||'—'],['Address',p.address||'—'],
    ['Sample rate',(s.sample_rate||'—')+' Hz'],
  ].map(([k,v])=>`<div class="k">${k}</div><div>${esc(v)}</div>`).join('') +
    `<div class="k">Notes</div><div>${esc(p.notes||'—')}</div>`;

  const fhrs = metrics.map(r=>r[1]).filter(v=>v!=null);
  const dur = (s.ended_at||0)-(s.started_at||0);
  const alarms = events.filter(e=>e.kind==='alarm' && /brady|tachy|signal/i.test(e.label)).length;
  const stat = (n,l,cls)=>`<div class="stat ${cls||''}"><div class="n">${n}</div><div class="l">${l}</div></div>`;
  $('#stats').innerHTML =
    stat(fmtDur(dur),'Duration') +
    stat(fhrs.length?Math.round(avg(fhrs)):'—','Mean FHR (bpm)') +
    stat(fhrs.length?(Math.min(...fhrs)+'–'+Math.max(...fhrs)):'—','FHR range') +
    stat(alarms,'Alarm episodes','alarm');

  drawTrendChart($('#trendcv'), metrics, {events});

  $('#evrows').innerHTML = events.length ? events.map(e=>{
    const type = e.kind==='session'?'Session': /brady|tachy/i.test(e.label)?'Alarm':
      /signal/i.test(e.label)?'Signal': 'Status';
    return `<tr><td>${fmtDur(e.t)}</td><td>${type}</td><td>${esc(e.label)}</td></tr>`;
  }).join('') : '<tr><td colspan="3">No events recorded.</td></tr>';

  $('#foot').textContent = 'Generated from recorded data · session #'+SID+
    ' · '+(metrics.length)+' trend points · fECG research server.';
  window.addEventListener('resize', ()=>drawTrendChart($('#trendcv'), metrics, {events}));
})();
</script>
</body>
</html>
