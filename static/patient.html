<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>fECG • Patient</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  /* page-specific 480x320 layout */
  #content{position:relative;overflow:hidden}
  .screen{position:absolute;inset:0}
  .screen.hidden{display:none}
  #monitor{display:flex;flex-direction:column;padding:8px;gap:7px}
  #info,#trends,#sessions{overflow-y:auto;padding:10px}
  #monitor .metrics{margin:0;grid-template-columns:1.15fr 1fr}
  #monitor .metric{padding:5px 11px}
  #monitor .metric .val{font-size:40px}
  #monitor .traces{flex:1;min-height:0;gap:7px}
  #monitor .trace{flex:1;min-height:0}
  #monitor .trace.fe{flex:1.35}
  #monitor .trace canvas{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <a class="back" href="/">‹</a>
      <div class="title" style="font-size:14px"><span id="ptitle">Patient</span></div>
      <div class="grow"></div>
      <span class="pill idle" id="status">idle</span>
      <button class="btn icon" id="freeze" title="Freeze trace">❚❚</button>
    </div>

    <div class="content pad0" id="content">
      <!-- MONITOR -->
      <div class="screen" id="monitor">
        <div class="alarm" id="alarm"><span id="alarmtxt"></span></div>
        <div class="metrics">
          <div class="metric fetal" id="m_fhr">
            <div class="lab">Fetal HR</div>
            <div><span class="val">—</span><span class="unit">bpm</span></div>
            <div class="rng">normal 110–160</div>
            <div class="sqwrap"><div class="sqbar" id="sqbar"></div></div>
          </div>
          <div class="metric mat" id="m_mhr">
            <div class="lab">Maternal HR</div>
            <div><span class="val">—</span><span class="unit">bpm</span></div>
            <div class="rng" id="sqtext">signal —</div>
          </div>
        </div>
        <div class="traces">
          <div class="trace" id="t_raw"><span class="tag"><i style="background:var(--raw)"></i>Raw abdominal</span><canvas></canvas></div>
          <div class="trace fe" id="t_fe"><span class="tag"><i style="background:var(--fecg)"></i>fECG · AI extracted</span><canvas></canvas></div>
        </div>
        <div class="replay" id="replaybar">
          <button class="btn" id="rp_play">▶</button>
          <input type="range" id="rp_seek" min="0" max="1000" value="0">
          <span class="clock" id="rp_clock">0s / 0s</span>
          <button class="btn ghost" id="rp_stop">Live</button>
        </div>
      </div>

      <!-- TRENDS -->
      <div class="screen hidden" id="trends">
        <div class="card">
          <h3 style="display:flex;align-items:center;gap:8px">FHR / MHR trend
            <select id="trendsel" style="margin-left:auto;min-height:32px;background:var(--bg2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:0 8px;font-size:12px"></select>
          </h3>
          <div class="chartwrap"><canvas id="trendcv"></canvas></div>
          <div class="legend">
            <span><i style="background:var(--fecg)"></i>Fetal HR</span>
            <span><i style="background:var(--raw)"></i>Maternal HR</span>
            <span><i style="background:rgba(52,211,153,.5)"></i>normal band 110–160</span>
          </div>
        </div>
        <div class="card">
          <h3>Alarm &amp; event log</h3>
          <div class="log" id="log"></div>
        </div>
      </div>

      <!-- SESSIONS -->
      <div class="screen hidden" id="sessions">
        <div class="card">
          <h3>Recording sessions</h3>
          <div class="sess" id="sesslist"></div>
        </div>
      </div>

      <!-- INFO -->
      <div class="screen hidden" id="info">
        <div class="card">
          <h3>Patient</h3>
          <div class="kv" id="kv"></div>
        </div>
        <div class="grid2">
          <div class="card" style="margin:0"><div class="lab muted">Recorded samples</div><div class="stat" id="nsamp">—</div></div>
          <div class="card" style="margin:0"><div class="lab muted">Sessions</div><div class="stat" id="nsess">—</div></div>
        </div>
        <div class="row" style="display:flex;gap:8px;margin-top:10px">
          <button class="btn ghost" id="edit" style="flex:1">Edit patient</button>
          <button class="btn danger" id="archive" style="flex:1">Archive</button>
        </div>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab active" data-tab="monitor"><span class="ic">♥</span>Monitor</div>
      <div class="tab" data-tab="trends"><span class="ic">📈</span>Trends</div>
      <div class="tab" data-tab="sessions"><span class="ic">≡</span>Sessions</div>
      <div class="tab" data-tab="info"><span class="ic">≣</span>Info</div>
    </div>
  </div>

<script src="/static/app.js"></script>
<script>
const PID = decodeURIComponent(location.pathname.split('/').pop());
const WINDOW = 1500;
const buf = { raw:new Float32Array(WINDOW), fe:new Float32Array(WINDOW) };
let head = 0, filled = 0, frozen = false;
let patient = null, idleTimer = null;

/* ---- tabs ---- */
function showTab(name){
  $$('.tab').forEach(x => x.classList.toggle('active', x.dataset.tab === name));
  ['monitor','trends','sessions','info'].forEach(s =>
    $('#'+s).classList.toggle('hidden', s !== name));
  if (name === 'monitor') resize();
  if (name === 'trends') drawTrendNow();
}
$$('.tab').forEach(t => t.onclick = () => showTab(t.dataset.tab));

/* ---- freeze ---- */
$('#freeze').onclick = () => {
  frozen = !frozen;
  $('#freeze').classList.toggle('accent', frozen);
  $('#t_raw').classList.toggle('frozen', frozen);
  $('#t_fe').classList.toggle('frozen', frozen);
};

/* ---- metrics ---- */
function setStatus(cls, txt){ const s=$('#status'); s.className='pill '+cls; s.textContent=txt; }
function applyMetrics(m){
  if (!m){ return; }
  const fhrEl=$('#m_fhr'), mhrEl=$('#m_mhr');
  $('.val',fhrEl).textContent = m.fhr ?? '—';
  $('.val',mhrEl).textContent = m.mhr ?? '—';
  const a = ALARM[m.alarm] || ALARM.ok;
  fhrEl.className = 'metric fetal ' + (m.alarm||'');
  // signal-quality bar
  const sq = m.sq||0, bar=$('#sqbar');
  bar.style.width = sq + '%';
  bar.style.background = sq>=60 ? 'var(--ok)' : sq>=30 ? 'var(--warn)' : 'var(--crit)';
  $('#sqtext').textContent = 'signal ' + (sq?sq+'%':'—');
  // alarm banner
  const al=$('#alarm');
  if (m.alarm && m.alarm!=='ok'){ al.className='alarm show '+m.alarm; $('#alarmtxt').textContent='⚠ '+a.label; }
  else al.className='alarm';
  // top status pill — only show "live" when there's actual data
  const hasData = (m.fhr!=null) || (m.mhr!=null) || (m.alarm && m.alarm!=='ok');
  if (!hasData){ setStatus('idle','idle'); return; }
  if (m.alarm==='low') setStatus('low','brady');
  else if (m.alarm==='high') setStatus('high','tachy');
  else if (m.alarm==='signal') setStatus('signal','signal');
  else setStatus('live','live');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(()=>{ setStatus('idle','idle'); $('#alarm').className='alarm'; }, 6000);
}

/* ---- canvas traces ---- */
function setup(c){
  const dpr=window.devicePixelRatio||1;
  c.width=Math.max(1,c.clientWidth*dpr); c.height=Math.max(1,c.clientHeight*dpr);
  const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); return ctx;
}
let cRaw, cFe, ctxRaw, ctxFe;
function resize(){
  cRaw=$('#t_raw canvas'); cFe=$('#t_fe canvas');
  ctxRaw=setup(cRaw); ctxFe=setup(cFe);
}
window.addEventListener('resize', () => { resize(); drawTrendNow(); });

function pushSample(raw, fe){
  if (frozen) return;
  buf.raw[head]=raw; buf.fe[head]=fe;
  head=(head+1)%WINDOW; filled=Math.min(filled+1,WINDOW);
}
function clearBuf(){ head=0; filled=0; }
function drawTrace(ctx, canvas, arr, color){
  const W=canvas.clientWidth, H=canvas.clientHeight;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.045)'; ctx.lineWidth=1;
  for(let x=W%40;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=H/2%30;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  if(filled<2) return;
  let mx=0.05; for(let i=0;i<filled;i++){const v=Math.abs(arr[i]); if(v>mx)mx=v;} mx*=1.25;
  ctx.strokeStyle=color; ctx.lineWidth=1.4; ctx.lineJoin='round'; ctx.beginPath();
  const n=filled, step=Math.max(1,Math.floor(n/W));
  let first=true;
  for(let i=0;i<n;i+=step){
    const idx=(head-n+i+WINDOW*2)%WINDOW;
    const x=W*i/(n-1);
    const y=H/2-(arr[idx]/mx)*(H/2*0.88);
    first?(ctx.moveTo(x,y),first=false):ctx.lineTo(x,y);
  }
  ctx.stroke();
}
const C={raw:'#22d3ee',fe:'#ff5c9d'};
function render(){
  if(ctxRaw) drawTrace(ctxRaw,cRaw,buf.raw,C.raw);
  if(ctxFe)  drawTrace(ctxFe,cFe,buf.fe,C.fe);
  requestAnimationFrame(render);
}

/* ---- trends + alarm log ---- */
let trendMetrics=[], trendEvents=[], selSession=null;
function drawTrendNow(){
  if($('#trends').classList.contains('hidden')) return;
  drawTrendChart($('#trendcv'), trendMetrics, {events:trendEvents});
}
function renderLog(events){
  const order=[...events].reverse();   // newest first
  $('#log').innerHTML = order.length ? order.map(e=>{
    const cls = e.kind==='session' ? 'session' :
      /brady/i.test(e.label)?'low': /tachy/i.test(e.label)?'high':
      /signal/i.test(e.label)?'signal': /normal/i.test(e.label)?'ok':'';
    const icon = e.kind==='session'?'◆': cls==='ok'?'✓':'⚠';
    return `<div class="ev ${cls}"><span class="t">${fmtDur(e.t)}</span>
      <span>${icon}</span><span class="lab">${esc(e.label)}</span></div>`;
  }).join('') : '<div class="muted" style="padding:8px">No events recorded.</div>';
}
async function loadTrend(sid){
  if(sid==null) return;
  selSession=sid;
  if($('#trendsel').value!=String(sid)) $('#trendsel').value=String(sid);
  const {ok,data}=await api('/api/sessions/'+sid+'/metrics');
  if(!ok){ trendMetrics=[]; trendEvents=[]; }
  else { trendMetrics=data.metrics||[]; trendEvents=data.events||[]; }
  renderLog(trendEvents); drawTrendNow();
}
$('#trendsel').onchange = () => loadTrend(parseInt($('#trendsel').value,10));

/* ---- sessions list + replay/export/report ---- */
function renderSessions(sess){
  $('#trendsel').innerHTML = sess.map(s=>{
    const dur = s.ended_at && s.started_at ? fmtDur(s.ended_at-s.started_at) : 'live';
    return `<option value="${s.id}">#${s.id} · ${fmtTime(s.started_at)} · ${dur}</option>`;
  }).join('') || '<option>—</option>';
  $('#sesslist').innerHTML = sess.length ? sess.map(s=>{
    const live = !s.ended_at;
    const dur = live ? 'live' : fmtDur((s.ended_at||0)-(s.started_at||0));
    return `<div class="s" data-sid="${s.id}">
      <div class="top"><span class="id">Session #${s.id}</span>
        <span class="muted">${s.sample_rate||'—'} Hz</span>
        <span class="dur">${dur}</span></div>
      <div class="when">${fmtTime(s.started_at)} → ${live?'in progress':fmtTime(s.ended_at)}</div>
      <div class="acts">
        <button class="btn ghost" data-act="trend">Trend</button>
        <button class="btn" data-act="replay">▶ Replay</button>
        <a class="btn ghost" href="/api/sessions/${s.id}/export.csv" download>CSV</a>
        <a class="btn ghost" href="/api/sessions/${s.id}/export.csv?kind=metrics" download>Metrics CSV</a>
        <a class="btn ghost" href="/report/${s.id}" target="_blank">Report</a>
      </div></div>`;
  }).join('') : '<div class="muted">No sessions yet.</div>';
  $$('#sesslist .s .acts button').forEach(b=>{
    b.onclick = () => {
      const sid = parseInt(b.closest('.s').dataset.sid,10);
      if(b.dataset.act==='trend'){ loadTrend(sid); showTab('trends'); }
      else if(b.dataset.act==='replay'){ startReplay(sid); }
    };
  });
}

/* ---- replay engine ---- */
let replaying=false, rpData=[], rpIdx=0, rpTimer=null, rpRate=62.5, rpPlaying=false;
async function startReplay(sid){
  const {ok,data}=await api('/api/sessions/'+sid+'/samples');
  if(!ok || !data.samples || data.samples.length<2){ toast('No waveform to replay',true); return; }
  rpData=data.samples; rpIdx=0;
  const span=rpData[rpData.length-1][0]-rpData[0][0];
  rpRate = span>0 ? (rpData.length-1)/span : 62.5;
  replaying=true; frozen=false;
  $('#freeze').classList.remove('accent');
  $('#replaybar').classList.add('show');
  $('#rp_seek').max = rpData.length-1;
  showTab('monitor');
  setStatus('signal','replay');
  rpSeekTo(0); playReplay(true);
}
function rpClock(){
  const cur = rpData.length? rpData[Math.min(rpIdx,rpData.length-1)][0]-rpData[0][0] : 0;
  const tot = rpData.length? rpData[rpData.length-1][0]-rpData[0][0] : 0;
  $('#rp_clock').textContent = fmtDur(cur)+' / '+fmtDur(tot);
}
function rpSeekTo(i){
  rpIdx=Math.max(0,Math.min(i,rpData.length-1));
  clearBuf();
  const start=Math.max(0, rpIdx-WINDOW);
  for(let k=start;k<rpIdx;k++){ buf.raw[head]=rpData[k][1]; buf.fe[head]=rpData[k][2];
    head=(head+1)%WINDOW; filled=Math.min(filled+1,WINDOW); }
  $('#rp_seek').value=rpIdx; rpClock();
}
function playReplay(on){
  rpPlaying=on; $('#rp_play').textContent = on?'❚❚':'▶';
  clearInterval(rpTimer);
  if(!on) return;
  const TICK=50, chunk=Math.max(1,Math.round(rpRate*TICK/1000));
  rpTimer=setInterval(()=>{
    if(rpIdx>=rpData.length-1){ playReplay(false); return; }
    const end=Math.min(rpData.length, rpIdx+chunk);
    for(;rpIdx<end;rpIdx++){ buf.raw[head]=rpData[rpIdx][1]; buf.fe[head]=rpData[rpIdx][2];
      head=(head+1)%WINDOW; filled=Math.min(filled+1,WINDOW); }
    $('#rp_seek').value=rpIdx; rpClock();
  }, TICK);
}
function stopReplay(){
  replaying=false; rpPlaying=false; clearInterval(rpTimer);
  $('#replaybar').classList.remove('show'); rpData=[]; clearBuf();
  setStatus('idle','live');
}
$('#rp_play').onclick = () => playReplay(!rpPlaying);
$('#rp_stop').onclick = stopReplay;
$('#rp_seek').oninput = e => { playReplay(false); rpSeekTo(parseInt(e.target.value,10)); };

/* ---- patient meta / info tab ---- */
async function loadMeta(){
  const {ok,data} = await api('/api/patients/'+encodeURIComponent(PID));
  if(!ok) return;
  patient = data;
  $('#ptitle').textContent = (data.full_name||data.id);
  document.title = 'fECG • ' + (data.full_name||data.id);
  $('#kv').innerHTML = [
    ['ID',data.id],['Name',data.full_name||'—'],['MRN',data.mrn||'—'],
    ['Gender',data.gender||'—'],['DOB',data.date_of_birth||'—'],
    ['Citizen ID',data.citizen_id||'—'],['Address',data.address||'—'],
    ['Notes',data.notes||'—'],
  ].map(([k,v])=>`<div class="k">${k}</div><div>${esc(v)}</div>`).join('');
  $('#nsamp').textContent=(data.stats.total_samples||0).toLocaleString();
  $('#nsess').textContent=data.stats.sessions.length;
  renderSessions(data.stats.sessions);
  if(data.live) applyMetrics(data.live);
  // default trend = most recent session
  if(selSession==null && data.stats.sessions.length) loadTrend(data.stats.sessions[0].id);
  else if(selSession!=null) loadTrend(selSession);
  if(!firstPreloaded){ for(const r of (data.recent||[])) pushSample(r[1],r[2]); firstPreloaded=true; }
}
let firstPreloaded=false;

$('#edit').onclick = () => openPatientSheet(patient, p => loadMeta());
$('#archive').onclick = async () => {
  if(!confirm('Archive this patient? It will be hidden from the list (history is kept).')) return;
  const {ok} = await api('/api/patients/'+encodeURIComponent(PID)+'/archive',{method:'POST',body:{archived:true}});
  if(ok){ toast('Patient archived'); setTimeout(()=>location.href='/',600); } else toast('Could not archive',true);
};

/* ---- live websocket ---- */
function connect(){
  const proto = location.protocol==='https:'?'wss':'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/live/${encodeURIComponent(PID)}`);
  let ping;
  ws.onopen = () => { ping=setInterval(()=>{ try{ws.send('ping');}catch(e){} },25000); };
  ws.onmessage = e => {
    const m=JSON.parse(e.data);
    if(m.type==='samples'){
      if(!replaying && m.data) for(const r of m.data) pushSample(r[1],r[2]);
      if(m.metrics && !replaying) applyMetrics(m.metrics);
    }
  };
  ws.onclose = () => { clearInterval(ping); setTimeout(connect,2000); };
  ws.onerror = () => { try{ws.close();}catch(e){} };
}

resize(); render(); loadMeta(); connect();
setInterval(loadMeta, 8000);
</script>
</body>
</html>
